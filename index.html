<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>屯門專線 - 玩具總動員主題顯示屏</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #5cc0f4;
            background-image: 
                radial-gradient(circle at 20% 30%, #ffffff 0%, #ffffff 4%, transparent 5%),
                radial-gradient(circle at 25% 28%, #ffffff 0%, #ffffff 6%, transparent 7%),
                radial-gradient(circle at 30% 32%, #ffffff 0%, #ffffff 5%, transparent 6%),
                radial-gradient(circle at 70% 60%, #ffffff 0%, #ffffff 5%, transparent 6%),
                radial-gradient(circle at 75% 58%, #ffffff 0%, #ffffff 7%, transparent 8%),
                radial-gradient(circle at 80% 62%, #ffffff 0%, #ffffff 4%, transparent 5%);
            background-size: 400px 400px;
            font-family: "Arial Rounded MT Bold", "Chalkboard SE", "Comic Sans MS", "Mplus Rounded 1c", "微軟正黑體", sans-serif;
            margin: 0; padding: 10px; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden;
        }
        .container {
            display: flex; width: 100%; max-width: 1024px; height: 100%; max-height: 600px;
            background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border-radius: 24px; border: 6px solid #ffffff; padding: 18px; box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15);
        }
        .left-panel { width: 60%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding-right: 15px; border-right: 3px dashed rgba(255, 255, 255, 0.5); }
        
        .board-header { display: flex; align-items: center; padding: 0 15px; height: 6%; font-size: 13px; font-weight: 900; color: #ffffff; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }
        .header-main { flex-grow: 1; }
        .header-slots { display: flex; min-width: 200px; justify-content: flex-end; text-align: right; }
        .header-slot { width: 60px; margin-left: 15px; } 

        .bus-row { display: flex; align-items: center; background: rgba(255, 255, 255, 0.85); padding: 8px 15px; border-radius: 16px; height: 14%; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05); }
        .bus-badge { width: 80px; padding: 4px 0; text-align: center; font-size: 22px; font-weight: 900; border-radius: 12px; color: #fff; margin-right: 15px; box-shadow: 0 3px 0px rgba(0,0,0,0.2); }
        .kmb-bg { background-color: #ff4757; }
        .ctb-bg { background-color: #ffa502; color: #fff; }
        .station-info { flex-grow: 1; font-size: 14px; color: #57606f; font-weight: bold; }
        .station-info .dest { font-size: 17px; font-weight: 900; color: #2f3542; }
        
        .eta-times { display: flex; min-width: 200px; justify-content: flex-end; font-size: 20px; font-weight: 900; text-align: right; }
        .time-box { width: 60px; margin-left: 15px; } 
        .time-next { color: #2ed573; font-size: 22px; }
        .time-sub { color: #a4b0be; } 

        .right-panel { width: 40%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding-left: 15px; text-align: center; }
        .date-box { font-size: 16px; color: #2f3542; font-weight: 900; margin-top: 10px; background: rgba(255,255,255,0.5); padding: 6px 12px; border-radius: 20px; width: 95%; word-wrap: break-word; }
        .clock-box { font-size: 56px; font-weight: 900; color: #ffffff; line-height: 1; margin: 8px 0; text-shadow: 3px 3px 0px #2f3542; display: flex; align-items: baseline; justify-content: center; }
        .clock-ampm { font-size: 24px; margin-left: 6px; font-weight: 900; color: #ffffff; text-shadow: 2px 2px 0px #2f3542; }
        /* 🌟 調整高寬，預留足夠空間給 Emoji 和英文全寫 */
        .weather-box { font-size: 15px; color: #ff6b81; font-weight: 900; background: rgba(255,255,255,0.7); padding: 6px 12px; border-radius: 20px; width: 95%; }
        .warning-bar { background: #ff4757; border: 2px solid #ffffff; color: #ffffff; font-size: 13px; font-weight: bold; padding: 6px 10px; border-radius: 12px; width: 90%; display: none; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .reminder-box { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 0 10px; font-size: 24px; font-weight: 900; line-height: 1.6; color: #2f3542; text-shadow: 1px 1px 0px #ffffff; }
        .reminder-highlight { color: #ff4757; font-size: 26px; display: inline-block; margin-top: 5px; }
        .footer { font-size: 11px; color: #ffffff; font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); width: 100%; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="left-panel">
        <div class="board-header">
            <div class="header-main">🚌 路線及目的地</div>
            <div class="header-slots">
                <div class="header-slot">即將到達</div>
                <div class="header-slot">下一班</div>
                <div class="header-slot">第三班</div>
            </div>
        </div>
        
        <div id="bus-board" style="display: flex; flex-direction: column; justify-content: space-between; height: 92%;">
            <!-- 由 JS 自動填入 -->
        </div>
    </div>
    
    <div class="right-panel">
        <div>
            <div class="date-box" id="live-date">00/00 Wednesday 星期三</div>
            <div class="clock-box"><span id="live-time">12:00</span><span class="clock-ampm" id="live-ampm">AM</span></div>
            <div class="weather-box" id="weather-text">26°C | 天氣晴朗 (Sunny ☀️)</div>
        </div>
        <div class="warning-bar" id="warning-box">⚠️ 注意：<span id="warning-list"></span></div>
        <div class="reminder-box">
            <div>出門口之前記得攞齊野呀!!<br><span class="reminder-highlight">Have a very good day❤️</span></div>
        </div>
        <div class="footer">
            <span id="update-time">更新時間: --:--:--</span>
        </div>
    </div>
</div>

<script>
    var CONFIG = {
        routes: [
            { no: '57M', company: 'kmb', station: '業旺邨', dest: '荔景北', base: [4, 16, 28] },
            { no: '59M', company: 'kmb', station: '龍逸邨', dest: '屯門碼頭', base: [2, 10, 18] },
            { no: '59X', company: 'kmb', station: '龍逸邨', dest: '屯門碼頭', base: [7, 15, 22] },
            { no: '960', company: 'kmb', station: '轉車站', dest: '會展站', base: [1, 12, 24] },
            { no: '961', company: 'kmb', station: '轉車站', dest: '灣仔會展', base: [9, 21, 33] },
            { no: '962G', company: 'ctb', station: '龍逸邨', dest: '屯門湖景', base: [14, 35, 50] }
        ]
    };

    function updateClockAndWeather() {
        var now = new Date();
        var options = { month: '2-digit', day: '2-digit' };
        
        var weekDaysEN = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        var weekDaysZH = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
        var currentDay = now.getDay();
        
        document.getElementById('live-date').innerText = now.toLocaleDateString('zh-HK', options) + ' ' + weekDaysEN[currentDay] + ' ' + weekDaysZH[currentDay];
        
        var hours = now.getHours();
        var minutes = now.getMinutes();
        var ampm = hours >= 12 ? 'PM' : 'AM';
        var displayHours = hours % 12;
        displayHours = displayHours ? displayHours : 12; 
        minutes = minutes < 10 ? '0' + minutes : minutes;
        var hoursStr = displayHours < 10 ? '0' + displayHours : displayHours;

        document.getElementById('live-time').innerText = hoursStr + ':' + minutes;
        document.getElementById('live-ampm').innerText = ampm;

        // 🌟 天氣邏輯：加入了對應的學習型 Emoji ☀️ 🍃 🌙
        var temp = 26;
        var statusZH = "天氣晴朗";
        var statusEN = "Sunny ☀️";
        
        if (hours >= 7 && hours < 18) {
            temp = 31;
            statusZH = "炎熱有陽光";
            statusEN = "Hot and Sunny ☀️";
        } else if (hours >= 18 && hours < 23) {
            temp = 27;
            statusZH = "微風清涼";
            statusEN = "Cool and Breezy 🍃";
        } else {
            temp = 24;
            statusZH = "夜間平靜";
            statusEN = "Clear and Calm 🌙";
        }
        
        document.getElementById('weather-text').innerText = temp + '°C | ' + statusZH + ' (' + statusEN + ')';
    }

    function updateBusDashboard() {
        var board = document.getElementById('bus-board');
        var htmlContent = '';
        var now = new Date();
        var currentSeconds = now.getSeconds();

        for (var i = 0; i < CONFIG.routes.length; i++) {
            var route = CONFIG.routes[i];
            var offset = Math.floor(currentSeconds / 20) % 3; 
            var t1 = (route.base[0] + offset) + 'm';
            var t2 = (route.base[1] + offset) + 'm';
            var t3 = (route.base[2] + offset) + 'm';

            htmlContent += '<div class="bus-row">' +
                '<div class="bus-badge ' + route.company + '-bg">' + route.no + '</div>' +
                '<div class="station-info">' +
                    '<div class="dest">往 ' + route.dest + '</div>' +
                    '<div>📍 ' + route.station + '</div>' +
                '</div>' +
                '<div class="eta-times">' +
                    '<span class="time-box time-next">' + t1 + '</span>' +
                    '<span class="time-box time-sub">' + t2 + '</span>' +
                    '<span class="time-box time-sub">' + t3 + '</span>' +
                '</div>' +
            '</div>';
        }
        board.innerHTML = htmlContent;
        
        var sec = now.getSeconds();
        sec = sec < 10 ? '0' + sec : sec;
        document.getElementById('update-time').innerText = '更新時間: ' + document.getElementById('live-time').innerText + ':' + sec + ' ' + document.getElementById('live-ampm').innerText;
    }

    updateClockAndWeather();
    updateBusDashboard();
    
    setInterval(updateClockAndWeather, 1000);
    setInterval(updateBusDashboard, 5000);
</script>

</body>
</html>
